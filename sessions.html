<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Sessions</title>
    <link rel="stylesheet" href="underviser.css">
</head>

<body onload="loadSessions()">

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="sidebar-title">
            <span>🚗</span>
            <h2>Fartmåler</h2>
        </div>

        <nav class="sidebar-menu">

            <a href="overblik.html" class="menu-item">
                <span>🏠</span> Overblik
            </a>

            <a href="maaling.html" class="menu-item">
                <span>📏</span> Målinger
            </a>

            <a href="gruppe.html" class="menu-item">
                <span>👥</span> Grupper
            </a>

            <a href="leaderboard.html" class="menu-item">
                <span>🏆</span> Leaderboard
            </a>

            <a href="sessions.html" class="menu-item active">
                <span>📊</span> Sessioner
            </a>

            <a href="indstillinger.html" class="menu-item">
                <span>⚙️</span> Indstillinger
            </a>

        </nav>

    </aside>


    <!-- CONTENT -->
    <main class="content">

        <!-- HEADER -->
        <header class="topbar">
            <h1>Alle sessions</h1>
        </header>

        <!-- SESSIONS LIST -->
        <section class="card">

            <div class="card-header">
                <h3>Aktive og afsluttede sessions</h3>

                <button class="danger-btn" onclick="deleteAllHistory()">
                    Slet al historik
                </button>
            </div>

            <div class="table-wrapper">

                <table class="session-table">

                    <thead>
                        <tr>
                            <th>Gruppe</th>
                            <th>Biltype</th>
                            <th>Vejtype</th>
                            <th>Fartgrænse</th>
                            <th>Status</th>
                            <th>Oprettet</th>
                            <th></th>
                        </tr>
                    </thead>

                    <tbody id="sessionsTableBody">
                        <tr>
                            <td colspan="7" class="loading-text">
                                Indlæser sessions...
                            </td>
                        </tr>
                    </tbody>

                </table>

            </div>

        </section>

    </main>

</div>

<!-- 🔥 CUSTOM MODAL -->
<div id="customModal" class="modal-overlay">

    <div class="modal-box">

        <h2 id="modalTitle">Titel</h2>
        <p id="modalMessage">Tekst</p>

        <div class="modal-actions">

            <button onclick="closeModal()" class="btn-secondary">
                Annuller
            </button>

            <button id="modalConfirmBtn" class="btn-danger">
                OK
            </button>

        </div>

    </div>

</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="api.js"></script>
<script src="underviser.js"></script>

</body>
</html>
