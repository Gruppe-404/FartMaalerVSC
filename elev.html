<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <title>Ny Måling</title>

    <link rel="stylesheet" href="Style.css">
</head>

<body>

<div class="measurement-container">

    <div class="measurement-card">

        <div class="header-row">

            <div class="icon-circle">
                👤
            </div>

            <div>

                <h1>
                    Start en ny session
                </h1>

                <p>
                    Udfyld oplysningerne og gør systemet klar til at registrere målinger
                </p>

            </div>

        </div>


        <!-- Error message -->
        <div
            id="errorBox"
            class="error-box"
            style="display: none;">
        </div>


        <!-- Group code -->
        <label for="groupCodeInput">
            Gruppekode
        </label>

        <input
            type="text"
            id="groupCodeInput"
            placeholder="Indtast jeres gruppekode">


        <!-- Car type -->
        <label for="carTypeSelect">
            Biltype
        </label>

        <select id="carTypeSelect">

            <option value="">
                Vælg biltype
            </option>

            <option value="Benzin Lille">
                Benzin - lille
            </option>

            <option value="Benzin Stor">
                Benzin - stor
            </option>

            <option value="Diesel">
                Diesel
            </option>

            <option value="Hybrid">
                Hybrid
            </option>

        </select>


        <!-- Road type -->
        <label for="roadTypeSelect">
            Vejtype
        </label>

        <select id="roadTypeSelect">

            <option value="">
                Vælg vejtype
            </option>

            <option value="Byzone">
                Byzone - 50 km/t
            </option>

            <option value="Landevej">
                Landevej - 80 km/t
            </option>

            <option value="Motorvej">
                Motorvej - 130 km/t
            </option>

        </select>


        <!-- Start button -->
        <button
            class="start-measure-btn"
            onclick="startSession()">

            ▶ Start session

        </button>


        <div class="info-text">
            Du kan ikke starte før gruppekode, biltype og vejtype er udfyldt
        </div>

    </div>

</div>


<!-- Axios -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<!-- Shared API -->
<script src="api.js"></script>

<!-- Student logic -->
<script src="elev.js"></script>

</body>

</html>
